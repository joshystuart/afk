name: Docker Alpha Release

on:
  workflow_dispatch:

concurrency:
  group: docker-alpha
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AFK alpha images
        env:
          DOCKERHUB_NAMESPACE: awayfromklaude
        run: |
          set -euo pipefail

          docker build -t "${DOCKERHUB_NAMESPACE}/afk-base:alpha" -f docker/base/Dockerfile docker
          docker push "${DOCKERHUB_NAMESPACE}/afk-base:alpha"

          for image in node python go rust dotnet java; do
            docker build \
              --build-arg BASE_TAG=alpha \
              -t "${DOCKERHUB_NAMESPACE}/afk-${image}:alpha" \
              -f "docker/${image}/Dockerfile" docker
            docker push "${DOCKERHUB_NAMESPACE}/afk-${image}:alpha"
          done
