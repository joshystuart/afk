services:
  afk-base:
    build:
      context: .
      dockerfile: base/Dockerfile
    image: awayfromklaude/afk-base:latest

  afk-node:
    build:
      context: .
      dockerfile: node/Dockerfile
    image: afk-node:latest
    depends_on:
      afk-base:
        condition: service_completed_successfully

  afk-python:
    build:
      context: .
      dockerfile: python/Dockerfile
    image: afk-python:latest
    depends_on:
      afk-base:
        condition: service_completed_successfully

  afk-go:
    build:
      context: .
      dockerfile: go/Dockerfile
    image: afk-go:latest
    depends_on:
      afk-base:
        condition: service_completed_successfully

  afk-rust:
    build:
      context: .
      dockerfile: rust/Dockerfile
    image: afk-rust:latest
    depends_on:
      afk-base:
        condition: service_completed_successfully

  afk-dotnet:
    build:
      context: .
      dockerfile: dotnet/Dockerfile
    image: afk-dotnet:latest
    depends_on:
      afk-base:
        condition: service_completed_successfully

  afk-java:
    build:
      context: .
      dockerfile: java/Dockerfile
    image: afk-java:latest
    depends_on:
      afk-base:
        condition: service_completed_successfully
