port: 3001
nodeEnv: production
baseUrl: http://localhost

logger:
  level: info
  prettyPrint: false

session:
  maxSessionsPerUser: 10

adminUser:
  username: "${ADMIN_USERNAME:-admin}"
  password: "${ADMIN_PASSWORD:-password123}"

auth:
  jwtSecret: "${JWT_SECRET:-afk-electron-secret-change-me}"

database:
  type: sqlite
  sqlite:
    database: "${DB_DATABASE:-afk.sqlite}"
    synchronize: true
    logging: false
  postgres:
    host: "${DB_HOST:-localhost}"
    port: "${DB_PORT:-5432}"
    username: "${DB_USERNAME:-afk}"
    password: "${DB_PASSWORD:-password}"
    database: "${DB_NAME:-afk}"
    synchronize: "${DB_SYNCHRONIZE:-true}"
    logging: "${DB_LOGGING:-false}"
