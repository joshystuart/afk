port: 4919
nodeEnv: production
baseUrl: http://localhost

logger:
  level: info
  prettyPrint: false

session:
  maxSessionsPerUser: 10

adminUser:
  username: "${ADMIN_USERNAME:-admin}"
  password: "${ADMIN_PASSWORD:-password123}"

auth:
  jwtSecret: "${AUTH_JWT_SECRET:-afk-electron-secret-change-me}"

database:
  type: sqlite
  sqlite:
    database: "${DB_SQLITE_DATABASE:-afk.sqlite}"
    synchronize: true
    logging: false
  postgres:
    host: "${DB_POSTGRES_HOST:-localhost}"
    port: "${DB_POSTGRES_PORT:-5432}"
    username: "${DB_POSTGRES_USERNAME:-afk}"
    password: "${DB_POSTGRES_PASSWORD:-password}"
    database: "${DB_POSTGRES_NAME:-afk}"
    synchronize: "${DB_POSTGRES_SYNCHRONIZE:-true}"
    logging: "${DB_POSTGRES_LOGGING:-false}"
