port: 3001
nodeEnv: development
baseUrl: http://localhost

logger:
  level: debug
  prettyPrint: true

session:
  maxSessionsPerUser: 10

adminUser:
  username: "${ADMIN_USERNAME:-admin}"
  password: "${ADMIN_PASSWORD:-password123}"

auth:
  jwtSecret: "${JWT_SECRET:-afk-development-secret-key-change-in-production}"